<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="theme-color" content="#667eea">
    <meta name="description" content="Vehicle check-in and service management system for Valentine's Garage">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'><rect fill='%23667eea' width='192' height='192'/><text x='50%' y='50%' font-size='100' font-weight='bold' fill='white' text-anchor='middle' dy='.3em'>🔧</text></svg>">
    <title>Services - Valentine's Garage</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🔧 Valentine's Garage</h1>
            <p>Truck Check-In & Service Management System</p>
        </header>

        <nav>
            <a class="nav-btn" href="index.html">Dashboard</a>
            <a class="nav-btn" href="check-in.html">Check-In</a>
            <a class="nav-btn" href="vehicles.html">Vehicles</a>
            <a class="nav-btn active" href="services.html">Services</a>
            <a class="nav-btn" href="employees.html">Employees</a>
            <a class="nav-btn" href="reports.html">Reports</a>
        </nav>

        <div class="page-section">
            <h2>🔨 Services & Work Notes</h2>
            
            <div class="form-group">
                <label for="serviceVehicleSelect">Select Vehicle *</label>
                <select id="serviceVehicleSelect" onchange="loadVehicleServices()">
                    <option value="">Choose a vehicle...</option>
                </select>
            </div>

            <div id="serviceDetails" style="display: none;">
                <div id="currentServiceInfo" class="card" style="margin-bottom: 20px;"></div>

                <h3>Add Work Task</h3>
                <div class="form-group">
                    <label for="taskEmployee">Employee Name *</label>
                    <input type="text" id="taskEmployee" placeholder="Who is performing this task?">
                </div>

                <div class="form-group">
                    <label for="taskDescription">Work Description *</label>
                    <textarea id="taskDescription" placeholder="Describe the work completed or to be done..."></textarea>
                </div>

                <div class="form-group">
                    <label for="taskStatus">Status *</label>
                    <select id="taskStatus">
                        <option value="in-progress">In Progress</option>
                        <option value="completed">Completed</option>
                    </select>
                </div>

                <button onclick="addWorkTask()">+ Add Work Task</button>

                <h3 style="margin-top: 30px;">Work Tasks for This Vehicle</h3>
                <div id="workTasksList"></div>
            </div>
        </div>
    </div>

    <script src="shared.js"></script>
    <script>
        function loadServiceVehicleOptions() {
            const select = document.getElementById('serviceVehicleSelect');
            select.innerHTML = '<option value="">Choose a vehicle...</option>';
            
            garage.vehicles.sort((a, b) => new Date(b.checkedInDate) - new Date(a.checkedInDate));
            
            garage.vehicles.forEach(vehicle => {
                const option = document.createElement('option');
                option.value = vehicle.id;
                option.textContent = `${vehicle.plateNumber} (${vehicle.status})`;
                select.appendChild(option);
            });
        }

        function loadVehicleServices() {
            const vehicleId = parseInt(document.getElementById('serviceVehicleSelect').value);
            const details = document.getElementById('serviceDetails');

            if (!vehicleId) {
                details.style.display = 'none';
                return;
            }

            const vehicle = garage.vehicles.find(v => v.id === vehicleId);
            details.style.display = 'block';

            // Display vehicle info
            const info = document.getElementById('currentServiceInfo');
            info.innerHTML = `
                <h4>Vehicle: ${vehicle.plateNumber}</h4>
                <p><strong>Condition:</strong> ${getConditionBadge(vehicle.condition)}</p>
                <p><strong>Kilometers:</strong> ${vehicle.kilometers.toLocaleString()} km</p>
                <p><strong>Status:</strong> ${getStatusBadge(vehicle.status)}</p>
                <p><strong>Initial Notes:</strong> ${vehicle.notes || 'No notes'}</p>
            `;

            displayWorkTasks(vehicleId);
        }

        function addWorkTask() {
            const vehicleId = parseInt(document.getElementById('serviceVehicleSelect').value);
            const employee = document.getElementById('taskEmployee').value.trim();
            const description = document.getElementById('taskDescription').value.trim();
            const status = document.getElementById('taskStatus').value;

            if (!employee || !description) {
                alert('Please fill in all required fields (marked with *)');
                return;
            }

            const task = {
                vehicleId: vehicleId,
                employeeName: employee,
                description: description,
                status: status
            };

            garage.addWorkTask(task);

            // Clear form
            document.getElementById('taskEmployee').value = '';
            document.getElementById('taskDescription').value = '';
            document.getElementById('taskStatus').value = 'in-progress';

            displayWorkTasks(vehicleId);
        }

        function displayWorkTasks(vehicleId) {
            const tasks = garage.getVehicleWorkTasks(vehicleId);
            const container = document.getElementById('workTasksList');

            if (tasks.length === 0) {
                container.innerHTML = '<p style="color: #999;">No work tasks yet for this vehicle</p>';
                return;
            }

            container.innerHTML = tasks.map(task => `
                <div class="work-item ${task.status === 'completed' ? 'completed' : ''}">
                    <p><strong>Employee:</strong> ${task.employeeName}</p>
                    <p><strong>Task:</strong> ${task.description}</p>
                    <p><strong>Status:</strong> ${getStatusBadge(task.status)}</p>
                    <p style="font-size: 0.9em; color: #999;">Added: ${formatDate(task.createdDate)}</p>
                    <button class="danger" style="margin-top: 10px;" onclick="deleteWorkTask(${task.id})">Remove Task</button>
                </div>
            `).join('');
        }

        function deleteWorkTask(taskId) {
            if (confirm('Are you sure you want to delete this work task?')) {
                garage.deleteWorkTask(taskId);
                const vehicleId = parseInt(document.getElementById('serviceVehicleSelect').value);
                displayWorkTasks(vehicleId);
            }
        }

        // Load service options on page load
        window.addEventListener('load', loadServiceVehicleOptions);
    </script>

    <script>
        // Register service worker
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('service-worker.js')
                    .then(reg => console.log('Service Worker registered'))
                    .catch(err => console.log('Service Worker registration failed:', err));
            });
        }
    </script>
</body>
</html>
